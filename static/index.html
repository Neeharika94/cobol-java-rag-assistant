<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COBOL to Java Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2rem;
            color: #38bdf8;
            margin-bottom: 8px;
        }

        header p {
            color: #94a3b8;
            font-size: 1rem;
        }

        .badge {
            display: inline-block;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.75rem;
            color: #38bdf8;
            margin: 4px;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .card h2 {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 16px;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 140px;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #38bdf8;
        }

        button {
            width: 100%;
            background: #0284c7;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s;
        }

        button:hover { background: #0369a1; }
        button:disabled { background: #334155; cursor: not-allowed; }

        .result-section { display: none; }

        .code-block {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            line-height: 1.6;
            color: #7dd3fc;
        }

        .examples-grid {
            display: grid;
            gap: 12px;
        }

        .example-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.85rem;
        }

        .example-item .label {
            color: #94a3b8;
            font-size: 0.75rem;
            margin-bottom: 4px;
        }

        .example-item code {
            font-family: 'Courier New', monospace;
            color: #7dd3fc;
        }

        .loading {
            text-align: center;
            color: #38bdf8;
            padding: 20px;
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #334155;
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #450a0a;
            border: 1px solid #991b1b;
            border-radius: 8px;
            padding: 16px;
            color: #fca5a5;
            display: none;
        }

        footer {
            text-align: center;
            color: #475569;
            font-size: 0.85rem;
            margin-top: 40px;
        }

        footer a { color: #38bdf8; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 COBOL to Java Assistant</h1>
            <p>AI-powered migration using Retrieval Augmented Generation</p>
            <br>
            <span class="badge">Claude AI</span>
            <span class="badge">ChromaDB</span>
            <span class="badge">FastAPI</span>
            <span class="badge">AWS EC2</span>
        </header>

        <div class="card">
            <h2>Enter COBOL Code</h2>
            <textarea 
                id="cobolInput" 
                placeholder="MOVE WS-NAME TO WS-OUTPUT"></textarea>
            <button onclick="convertCode()" id="convertBtn">
                Convert to Java →
            </button>
        </div>

        <div class="loading" id="loading">
            <span class="spinner"></span>
            Analyzing COBOL and generating Java...
        </div>

        <div class="error" id="error"></div>

        <div class="result-section" id="resultSection">
            <div class="card">
                <h2>Java Output</h2>
                <div class="code-block" id="javaOutput"></div>
            </div>

            <div class="card">
                <h2>Similar Examples Used (RAG)</h2>
                <div class="examples-grid" id="examplesGrid"></div>
            </div>
        </div>

        <footer>
            Built by Neeharika Cheruku · 
            <a href="/docs">API Docs</a> · 
            <a href="https://github.com/Neeharika94/cobol-java-rag-assistant">GitHub</a>
        </footer>
    </div>

    <script>
        async function convertCode() {
            const cobolCode = document.getElementById('cobolInput').value.trim();
            
            if (!cobolCode) {
                showError('Please enter some COBOL code first.');
                return;
            }

            // Show loading
            document.getElementById('convertBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('error').style.display = 'none';

            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cobol_code: cobolCode })
                });

                if (!response.ok) throw new Error('Conversion failed');

                const data = await response.json();

                // Show Java output
                document.getElementById('javaOutput').textContent = data.java_code;

                // Show similar examples
                const grid = document.getElementById('examplesGrid');
                grid.innerHTML = '';
                data.similar_examples.forEach(ex => {
                    grid.innerHTML += `
                        <div class="example-item">
                            <div class="label">COBOL</div>
                            <code>${ex.cobol}</code>
                            <div class="label" style="margin-top:8px">Java</div>
                            <code>${ex.java}</code>
                        </div>
                    `;
                });

                document.getElementById('resultSection').style.display = 'block';

            } catch (err) {
                showError('Something went wrong. Please try again.');
            } finally {
                document.getElementById('convertBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }

        // Allow Ctrl+Enter to convert
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') convertCode();
        });
    </script>
</body>
</html>
